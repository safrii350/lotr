<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber-Nexus-Proto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/shell.css" />
  </head>
  <body>
    <div class="app-page">
      <div class="app-column">
        <div class="win-dialog" role="application" aria-label="Cyber-Nexus-Proto">
          <div class="win-dialog-client">
            <div id="game-root" class="win-viewport" aria-label="Spielfläche"></div>
          </div>

          <footer class="win-footer">
            <section class="win-footer-panel" aria-labelledby="controls-heading">
              <h2 id="controls-heading" class="win-footer-title">Steuerung</h2>
              <ul class="win-control-list">
                <li>
                  <kbd class="win-kbd">W</kbd>
                  <kbd class="win-kbd">A</kbd>
                  <kbd class="win-kbd">S</kbd>
                  <kbd class="win-kbd">D</kbd>
                  <span class="win-control-desc">Laufen</span>
                </li>
                <li><span class="win-control-desc">Alternativ: Pfeiltasten</span></li>
                <li>
                  <span class="win-control-desc">Zwei Richtungen gleichzeitig für diagonal</span>
                </li>
                <li>
                  <kbd class="win-kbd">Shift</kbd>
                  <span class="win-control-desc">halten + Richtung = rennen</span>
                </li>
                <li>
                  <kbd class="win-kbd">E</kbd>
                  <span class="win-control-desc"
                    >Angriff: stehend · beim Gehen · mit
                    <kbd class="win-kbd">Shift</kbd> + Richtung beim Rennen</span
                  >
                </li>
              </ul>
            </section>

            <div class="win-footer-aside">
              <time class="win-clock" id="app-clock" datetime="">--:--</time>
              <a
                class="win-link"
                href="https://github.com/safrii350/lotr"
                target="_blank"
                rel="noopener noreferrer"
              >
                github.com/safrii350/lotr
              </a>
            </div>
          </footer>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script type="module" src="js/main.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const clockEl = document.getElementById('app-clock');
        if (!clockEl) return;
        const tick = () => {
          const now = new Date();
          clockEl.textContent = now.toLocaleTimeString('de-DE', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
          });
          clockEl.dateTime = now.toISOString();
        };
        tick();
        setInterval(tick, 1000);
      });
    </script>
  </body>
</html>
