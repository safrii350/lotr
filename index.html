<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber-Nexus-Proto</title>
    <link rel="stylesheet" href="css/wii-frame.css" />
  </head>
  <body>
    <div class="wii-shell">
      <div class="wii-bg-glow" aria-hidden="true"></div>

      <main class="wii-main">
        <div class="wii-stage-row">
          <div class="wii-channel-frame" aria-label="Spielfenster">
            <div class="wii-channel-gloss" aria-hidden="true"></div>
            <div class="wii-channel-inner">
              <div id="game-root" class="wii-screen" role="application" aria-label="Spielfläche"></div>
            </div>
          </div>

          <aside class="wii-system-msg" aria-labelledby="wii-controls-heading">
            <div class="wii-system-msg-inner">
              <div class="wii-msg-header-pill">
                <h2 id="wii-controls-heading" class="wii-msg-header-text">Steuerung</h2>
              </div>
              <div class="wii-msg-body">
                <p class="wii-msg-lead">So bewegst du die Figur:</p>
                <ul class="wii-msg-list">
                  <li>
                    <kbd class="wii-kbd">W</kbd>
                    <kbd class="wii-kbd">A</kbd>
                    <kbd class="wii-kbd">S</kbd>
                    <kbd class="wii-kbd">D</kbd>
                    <span class="wii-msg-desc">Laufen</span>
                  </li>
                  <li>
                    <span class="wii-msg-desc">oder Pfeiltasten</span>
                  </li>
                  <li>
                    <span class="wii-msg-desc">Zwei Richtungen gleichzeitig für diagonal</span>
                  </li>
                </ul>
              </div>
            </div>
          </aside>
        </div>
      </main>

      <footer class="wii-dock">
        <div class="wii-dock-inner">
          <div class="wii-dock-buttons" role="toolbar" aria-label="Baustellen-Hinweise">
            <span class="wii-orb" title="Under construction">🚧</span>
            <span class="wii-orb" title="Under construction">🏗️</span>
            <span class="wii-orb" title="Under construction">👷</span>
            <span class="wii-orb" title="Under construction">🔧</span>
            <span class="wii-orb" title="Under construction">⚠️</span>
          </div>
          <time class="wii-clock" id="wii-clock" datetime="">--:--</time>
        </div>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script type="module" src="js/main.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const clockEl = document.getElementById('wii-clock');
        if (!clockEl) return;
        const tick = () => {
          const now = new Date();
          clockEl.textContent = now.toLocaleTimeString('de-DE', {
            hour: '2-digit',
            minute: '2-digit',
          });
          clockEl.dateTime = now.toISOString();
        };
        tick();
        setInterval(tick, 1000);
      });
    </script>
  </body>
</html>
